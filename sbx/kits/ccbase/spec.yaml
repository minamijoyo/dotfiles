schemaVersion: "1"
kind: agent
name: ccbase
agent:
  image: "docker/sandbox-templates:claude-code-docker"
  aiFilename: CLAUDE.md
  persistence: persistent
  entrypoint:
    run: [claude]

network:
  serviceDomains:
    api.anthropic.com: anthropic
    console.anthropic.com: anthropic
  serviceAuth:
    anthropic:
      headerName: x-api-key
      valueFormat: "%s"
  allowedDomains:
    - api.anthropic.com:443
    - platform.claude.com:443
    - api.github.com:443
    - raw.githubusercontent.com:443
    - cli.github.com:443
    - ports.ubuntu.com:80
    - download.docker.com:443
    - awscli.amazonaws.com:443
    - "*.ap-northeast-1.amazonaws.com:443"
    - "*.ap-northeast-3.amazonaws.com:443"
    - "*.us-east-1.amazonaws.com:443"
    - "*.us-east-2.amazonaws.com:443"

environment:
  variables:
    IS_SANDBOX: "1"
    AWS_PAGER: ""

commands:
  install:
    - command: |
        # Install GitHub CLI
        (type -p wget >/dev/null || (sudo apt update && sudo apt install wget -y)) \
        && sudo mkdir -p -m 755 /etc/apt/keyrings \
        && out=$(mktemp) && wget -nv -O$out https://cli.github.com/packages/githubcli-archive-keyring.gpg \
        && cat $out | sudo tee /etc/apt/keyrings/githubcli-archive-keyring.gpg > /dev/null \
        && sudo chmod go+r /etc/apt/keyrings/githubcli-archive-keyring.gpg \
        && sudo mkdir -p -m 755 /etc/apt/sources.list.d \
        && echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null \
        && sudo apt update \
        && sudo apt install gh -y
        # Install AWS CLI v2
        ARCH="$(uname -m)" && curl "https://awscli.amazonaws.com/awscli-exe-linux-$ARCH.zip" -o "awscliv2.zip" \
        && unzip awscliv2.zip \
        && sudo ./aws/install \
        && rm -rf aws awscliv2.zip
