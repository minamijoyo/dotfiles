[settings]
minimum_release_age = "7d"
lockfile = true
lockfile_platforms = ["macos-arm64"]
disable_backends = ["asdf", "vfox"]
idiomatic_version_file_enable_tools = [
  "go",
  "node",
  "opentofu",
  "python",
  "ruby",
  "terraform",
]

[settings.ruby]
compile = false

[settings.pipx]
registry_url="https://pypi.flatt.tech/simple/{}/"

[tools]
direnv = "latest"
gh = "latest"
ghq = "latest"
ghtkn = "0.2.5"
"github:fencesandbox/fence" = "latest"
go = "1.26"
jq = "latest"
node = "24"
opentofu = "1.12"
peco = "latest"
pinact = "latest"
"pipx:jupytext" = "latest"
"pipx:sqlparse" = "latest"
poetry = "2.4.1"
python = "3.13"
ripgrep = "latest"
ruby = "3.4"
shellcheck = "latest"
terraform = "1.15"
tflint = "latest"
tmux = "latest"
uv = "latest"
